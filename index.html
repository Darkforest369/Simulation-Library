<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Simulation Library</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="gallery-shell">
    <header class="gallery-header">
      <p class="eyebrow">Simulation Gallery</p>
      <h1>Explore the physics experiments</h1>
      <p class="intro">Select a simulation below and jump directly to the experience.</p>
    </header>

    <section class="simulation-grid">
      <article class="simulation-card">
        <div class="card-illustration" aria-hidden="true">
          <svg viewBox="0 0 120 140" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <linearGradient id="bobGradient" x1="0" y1="0" x2="1" y2="1">
                <stop offset="0%" stop-color="#00e5ff" />
                <stop offset="100%" stop-color="#3ea8ff" />
              </linearGradient>
              <linearGradient id="rodGradient" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stop-color="#8ef6ff" />
                <stop offset="100%" stop-color="#1ee0ff" />
              </linearGradient>
            </defs>
            <rect x="10" y="12" width="100" height="10" rx="5" fill="#222" />
            <circle cx="60" cy="17" r="4" fill="#9ce9ff" />
            <line x1="60" y1="21" x2="60" y2="84" stroke="url(#rodGradient)" stroke-width="3" stroke-linecap="round" />
            <path d="M28 36 C43 18, 77 18, 92 36" stroke="#00e5ff" stroke-width="1.3" fill="none" opacity="0.55" />
            <circle cx="60" cy="108" r="18" fill="url(#bobGradient)" />
            <circle cx="60" cy="108" r="8" fill="#111" />
            <circle cx="54" cy="102" r="3" fill="rgba(255,255,255,0.75)" />
            <ellipse cx="60" cy="128" rx="24" ry="6" fill="rgba(0,229,255,0.12)" />
          </svg>
        </div>

        <div class="card-copy">
          <span class="sim-type">Pendulum</span>
          <h2>Chaotic Motion</h2>
          <p>Visit the live pendulum simulation and explore speed, friction, audio, and butterfly mode in a sleek dark interface.</p>
        </div>

        <button type="button" class="sim-button" id="openSimulationBtn">
          Open Pendulum Simulation
        </button>
      </article>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
