<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Simulation Library</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="gallery-shell">
    <header class="gallery-header">
      <p class="eyebrow">Simulation Gallery</p>
      <h1>Explore the physics experiments</h1>
      <p class="intro">Select a simulation below and jump directly to the experience.</p>
    </header>

    <section class="simulation-grid">
      <article class="simulation-card">
        <div class="card-illustration" aria-hidden="true">
          <svg viewBox="0 0 120 140" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <linearGradient id="rodGradient" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stop-color="#ff3b3b" />
                <stop offset="100%" stop-color="#3b8bff" />
              </linearGradient>
            </defs>
            <rect x="10" y="12" width="100" height="10" rx="5" fill="#222" />
            <circle cx="60" cy="17" r="3" fill="#fff" opacity="0.95" />
            <line x1="60" y1="20" x2="47" y2="58" stroke="url(#rodGradient)" stroke-width="3" stroke-linecap="round" />
            <circle cx="47" cy="58" r="5" fill="#fff" />
            <line x1="47" y1="58" x2="34" y2="96" stroke="url(#rodGradient)" stroke-width="3" stroke-linecap="round" />
            <circle cx="34" cy="96" r="5" fill="#fff" />
            <path d="M33 100 L66 124" stroke="rgba(255,255,255,0.08)" stroke-width="2" />
          </svg>
        </div>

        <div class="card-copy">
          <span class="sim-type">Pendulum</span>
          <h2>Chaotic Motion</h2>
          <p>Visit the live pendulum simulation and explore speed, friction, audio, and butterfly mode in a sleek dark interface.</p>
        </div>

        <a class="sim-button" href="https://Darkforest369.github.io/Pendulum-Simulation" target="_blank" rel="noopener noreferrer">
          Open Pendulum Simulation
        </a>
      </article>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
